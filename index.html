<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/hiagorhyanns/mercado-livre-api/b68952612a72fac4e2c1f1f597ff479595dc72cb/ChatGPT%20Image%2029%20de%20mar.%20de%202026%2C%2016_49_42.png">
<title>Conectar Mercado Livre</title>
<style>
body {
  margin:0;
  font-family: Inter, Helvetica;
  background:#ededed;
}
.container {
  display:flex;
  justify-content:center;
  margin-top:80px;
}
.card {
  background:white;
  width:420px;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
h2 {
  color: #757260;
  margin-bottom:20px;
}
label {
  font-size:14px;
  color:#333;
}
input {
  width:100%;
  padding:12px;
  margin:8px 0 15px;
  border:1px solid #ccc;
  border-radius:6px;
}
input:focus {
  border-color:#3483fa;
  outline:none;
}
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
.connect {
  background:#3483fa;
  color:white;
}
.connect:hover {
  background:#2968c8;
}
.edit {
  background:transparent;
  color:#3483fa;
  margin-bottom:10px;
}
.footer {
  margin-top:15px;
  font-size:12px;
  color:#777;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>Conectar ML</h2>

    <label>Client ID</label>
    <input id="client_id">

    <label>Client Secret</label>
    <input id="client_secret">

    <label>Redirect URI</label>
    <input id="redirect_uri">

    <button class="edit" onclick="editar()">Editar campos</button>
    <button class="connect" onclick="conectar()">Conectar com Mercado Livre</button>

    <div class="footer">Integração via API</div>

  </div>
</div>

<script>

// DEFAULT
function defaultData(){
  return {
    client_id: "",
    client_secret: "",
    redirect_uri: window.location.origin + "/api/connect"
  }
}

// LOAD
function load(){
  const data = JSON.parse(localStorage.getItem("ml_data")) || defaultData();

  document.getElementById("client_id").value = data.client_id;
  document.getElementById("client_secret").value = data.client_secret;
  document.getElementById("redirect_uri").value = data.redirect_uri;

  bloquear();
}

// SAVE
function save(){
  const data = {
    client_id: document.getElementById("client_id").value,
    client_secret: document.getElementById("client_secret").value,
    redirect_uri: document.getElementById("redirect_uri").value
  };

  localStorage.setItem("ml_data", JSON.stringify(data));
}

// LOCK
function bloquear(){
  document.querySelectorAll("input").forEach(i => i.disabled = true);
}

// UNLOCK
function editar(){
  document.querySelectorAll("input").forEach(i => i.disabled = false);
}

// CONNECT (CORRETO)
function conectar(){
  save();

  const clientId = document.getElementById("client_id").value;
  const redirectUri = document.getElementById("redirect_uri").value;

  const url = `https://auth.mercadolivre.com.br/authorization?response_type=code&client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}`;

  window.location.href = url;
}

// INIT
window.onload = load;

</script>

</body>
</html>
