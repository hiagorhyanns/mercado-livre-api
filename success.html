<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/hiagorhyanns/mercado-livre-api/b68952612a72fac4e2c1f1f597ff479595dc72cb/ChatGPT%20Image%2029%20de%20mar.%20de%202026%2C%2016_49_42.png">
<title>Conectado</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#ededed;
}
.header {
  background:#ffe600;
  padding:16px 30px;
  font-weight:bold;
}
.container {
  display:flex;
  justify-content:center;
  margin-top:80px;
}
.card {
  background:white;
  width:420px;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
  text-align:center;
}
.token {
  width:100%;
  height:80px;
}
.alert {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#00a650;
  color:white;
  padding:15px 25px;
  border-radius:6px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
  animation:fadeOut 4s forwards;
}
@keyframes fadeOut {
  0% {opacity:1;}
  80% {opacity:1;}
  100% {opacity:0; display:none;}
}
</style>
</head>

<body>

<div class="header">Mercado Livre</div>

<div class="alert">
<img width="30px" src="https://marketplace.canva.com/44VpY/MAFJGS44VpY/1/tl/canva-green-ok-tick-approval-MAFJGS44VpY.png"/> Sua API foi conectada (6h)
</div>

<div class="container">
  <div class="card">

    <div class="success-icon"><img width="30px" src="https://marketplace.canva.com/44VpY/MAFJGS44VpY/1/tl/canva-green-ok-tick-approval-MAFJGS44VpY.png"/></div>

    <h2>Conectado</h2>

    <p><b>User:</b> <span id="user"></span></p>

    <p><b>Código TG:</b></p>
    <input id="tg" readonly>

    <p><b>Token:</b></p>
    <textarea class="token" id="token"></textarea>

  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("user").innerText = params.get("user");
document.getElementById("token").value = params.get("token");
document.getElementById("tg").value = params.get("tg");
</script>

</body>
</html>
