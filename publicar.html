<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://raw.githubusercontent.com/hiagorhyanns/mercado-livre-api/29a8c4b095c3e39ee5ecf28f0e4be283621d5f61/img/conectado-ml.png">
<title>:: Publicar Anúncios ::</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { font-family: 'Inter'; box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f5; min-height: 100vh; }

.header {
  background: #fff159; padding: 14px 30px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  position: sticky; top: 0; z-index: 100;
}
.header-title { font-size: 18px; font-weight: 700; color: #333; }
.header-sub   { font-size: 13px; color: #555; margin-left: auto; }

.container { max-width: 980px; margin: 30px auto; padding: 0 20px 100px; }

.card {
  background: white; padding: 24px; margin-bottom: 16px;
  border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border: 1px solid #e8e8e8;
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0;
}
.card-num {
  font-size: 13px; font-weight: 600; color: #3483fa;
  background: #e8f0fe; padding: 4px 12px; border-radius: 20px;
}

label {
  display: block; font-size: 12px; font-weight: 600;
  color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;
}
.field { margin-bottom: 14px; }
.field-row { display: flex; gap: 10px; flex-wrap: wrap; }
.field-row .field { flex: 1; min-width: 140px; }

input, textarea, select {
  padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
  width: 100%; font-size: 14px; font-family: 'Inter';
  transition: border-color 0.2s; background: #fafafa;
}
input:focus, textarea:focus, select:focus {
  border-color: #3483fa; outline: none; background: white;
}
textarea { height: 70px; resize: vertical; }

.extra-box {
  background: #fffbf0; border: 1px solid #f0c040;
  border-radius: 8px; padding: 16px; margin-bottom: 14px;
}
.extra-box-title {
  font-size: 12px; font-weight: 700; color: #b8860b;
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
}

.titulo-wrap { position: relative; }
.titulo-counter {
  position: absolute; right: 10px; top: 10px;
  font-size: 11px; color: #aaa; pointer-events: none;
}

.result-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-radius: 6px; margin-bottom: 6px; font-size: 13px;
}
.result-ok  { background: #e8f8ef; color: #007a35; }
.result-err { background: #fff0f0; color: #cc0000; }
.result-cause { font-size: 11px; margin-top: 4px; opacity: 0.85; line-height: 1.5; }
.result-link { font-size: 11px; color: #3483fa; }

.btn-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 1px solid #e0e0e0;
  padding: 12px 30px; display: flex; gap: 10px; justify-content: center; z-index: 200;
}
button {
  padding: 12px 24px; border: none; border-radius: 6px;
  font-weight: 600; cursor: pointer; font-size: 14px; font-family: 'Inter';
  transition: opacity 0.2s, transform 0.1s;
}
button:active { transform: scale(0.98); }
.btn-add     { background: #e8f0fe; color: #3483fa; }
.btn-publish { background: #3483fa; color: white; min-width: 200px; }
.btn-publish:disabled { background: #999; cursor: not-allowed; transform: none; }
.btn-remove  {
  background: transparent; color: #ccc;
  padding: 4px 10px; font-size: 20px; line-height: 1;
}
.btn-remove:hover { color: #ff3b3b; }

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.alert {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 14px 24px; border-radius: 8px; font-weight: 600; color: white;
  z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  animation: fadeOut 4.5s forwards;
}
.success { background: #00a650; }
.error   { background: #ff3b3b; }
@keyframes fadeOut { 0%,75%{opacity:1} 100%{opacity:0} }

#resultArea { margin-bottom: 20px; }
.result-header { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">🛍️</span>
  <span class="header-title">Publicar Anúncios em Massa</span>
  <span class="header-sub" id="contadorLabel">0 anúncios</span>
</div>

<div class="container">
  <div id="resultArea"></div>
  <div id="formArea"></div>
</div>

<div class="btn-bar">
  <button class="btn-add" onclick="addForm()">+ Adicionar anúncio</button>
  <button class="btn-publish" id="btnPublish" onclick="publicar()">Publicar tudo</button>
</div>

<script>
const token = new URLSearchParams(window.location.search).get("token");

// Atributos que já gerenciamos — não vão aparecer como "extras"
const HANDLED = new Set([
  "BRAND","GENDER","COLOR","SIZE","MODEL","ALPHANUMERIC_SIZE",
  "SELLER_SKU","ITEM_CONDITION","GTIN","MPN","PACKAGE_WIDTH",
  "PACKAGE_HEIGHT","PACKAGE_LENGTH","PACKAGE_WEIGHT"
]);

const attrCache = {};

// ─── ALERT ───────────────────────────────────────────────────────────────────
function showAlert(msg, type = "success") {
  document.querySelectorAll(".alert").forEach(a => a.remove());
  const div = document.createElement("div");
  div.className = `alert ${type}`;
  div.innerText = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 4500);
}

// ─── PREÇO ───────────────────────────────────────────────────────────────────
function formatarPreco(input) {
  let v = input.value.replace(/\D/g, "");
  if (!v) { input.value = ""; return; }
  v = (parseInt(v) / 100).toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  input.value = "R$ " + v;
}

// ─── TÍTULO ──────────────────────────────────────────────────────────────────
function gerarTitulo(card) {
  const g = n => { const e = card.querySelector(`[name="${n}"]`); return e ? e.value.trim() : ""; };
  const t = [g("produto"),g("modelo"),g("marca"),g("cor"),g("sexo")].filter(Boolean).join(" ").substring(0,60);
  const inp = card.querySelector('[name="titulo"]');
  inp.value = t;
  atualizarContador(inp);
}
function atualizarContador(input) {
  const c = input.closest(".titulo-wrap")?.querySelector(".titulo-counter");
  if (c) c.textContent = input.value.length + "/60";
}

// ─── NUMERAÇÃO ───────────────────────────────────────────────────────────────
function atualizarNumeracao() {
  document.querySelectorAll(".card").forEach((card, i) => {
    const n = card.querySelector(".card-num");
    if (n) n.textContent = `Anúncio ${i + 1}`;
  });
  document.getElementById("contadorLabel").textContent =
    document.querySelectorAll(".card").length + " anúncio(s)";
}
function removerCard(btn) {
  btn.closest(".card").remove();
  atualizarNumeracao();
}

// ─── BUSCAR ATRIBUTOS OBRIGATÓRIOS DA ML ────────────────────────────────────
async function carregarAtributosExtras(categoryId, container) {
  container.style.display = "block";
  container.innerHTML = `<div class="extra-box-title">⏳ Buscando campos da categoria...</div>`;

  try {
    if (!attrCache[categoryId]) {
      const res = await fetch(`https://api.mercadolibre.com/categories/${categoryId}/attributes`);
      attrCache[categoryId] = await res.json();
    }

    const attrs = attrCache[categoryId];

    // Somente obrigatórios que não tratamos
    const extras = attrs.filter(a =>
      a.tags?.required === true &&
      !HANDLED.has(a.id)
    );

    if (extras.length === 0) {
      container.style.display = "none";
      container.innerHTML = "";
      return;
    }

    container.innerHTML = `<div class="extra-box-title">⚠️ Campos obrigatórios desta categoria (${extras.length})</div>`;

    const row = document.createElement("div");
    row.className = "field-row";

    extras.forEach(attr => {
      const field = document.createElement("div");
      field.className = "field";

      if (attr.allowed_values && attr.allowed_values.length > 0) {
        field.innerHTML = `
          <label>${attr.name}</label>
          <select data-attr-id="${attr.id}" data-attr-name="${attr.name}">
            <option value="">Selecione</option>
            ${attr.allowed_values.map(v =>
              `<option value="${v.id}" data-vname="${v.name}">${v.name}</option>`
            ).join("")}
          </select>`;
      } else {
        field.innerHTML = `
          <label>${attr.name}</label>
          <input data-attr-id="${attr.id}" data-attr-name="${attr.name}"
            placeholder="Digite ${attr.name}"
            type="${attr.value_type === 'number' ? 'number' : 'text'}">`;
      }

      row.appendChild(field);
    });

    container.appendChild(row);

  } catch (e) {
    container.innerHTML = `<div style="color:#999;font-size:12px">Não foi possível carregar campos extras (${e.message}).</div>`;
  }
}

// ─── CATEGORIA MUDOU ─────────────────────────────────────────────────────────
function onCategoriaChange(select) {
  const card = select.closest(".card");
  const box  = card.querySelector(".extra-box");
  const cat  = select.value;
  if (cat) carregarAtributosExtras(cat, box);
  else box.style.display = "none";
}

// ─── ADD FORM ─────────────────────────────────────────────────────────────────
function addForm() {
  const div = document.createElement("div");
  div.className = "card";
  const idx = document.querySelectorAll(".card").length + 1;

  div.innerHTML = `
    <div class="card-header">
      <span class="card-num">Anúncio ${idx}</span>
      <button class="btn-remove" onclick="removerCard(this)">×</button>
    </div>

    <div class="field">
      <label>Categoria</label>
      <select name="categoria" onchange="onCategoriaChange(this)">
        <option value="MLB1430">Vestidos (MLB1430)</option>
        <option value="MLB1196">Blusas e Camisetas Femininas (MLB1196)</option>
        <option value="MLB1292">Calças Femininas (MLB1292)</option>
        <option value="MLB1294">Saias (MLB1294)</option>
        <option value="MLB1435">Macacões e Macaquinhos (MLB1435)</option>
        <option value="MLB1182">Conjuntos Femininos (MLB1182)</option>
        <option value="MLB1269">Camisas Masculinas (MLB1269)</option>
        <option value="MLB1273">Calças Masculinas (MLB1273)</option>
      </select>
    </div>

    <!-- CAMPOS EXTRAS DINÂMICOS -->
    <div class="extra-box" style="display:none"></div>

    <div class="field">
      <label>URLs das Imagens</label>
      <div class="field-row">
        <div class="field"><input name="img1" placeholder="Imagem 1 (obrigatória)"></div>
        <div class="field"><input name="img2" placeholder="Imagem 2"></div>
        <div class="field"><input name="img3" placeholder="Imagem 3"></div>
        <div class="field"><input name="img4" placeholder="Imagem 4"></div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Produto</label>
        <input name="produto" placeholder="ex: Vestido Midi" oninput="gerarTitulo(this.closest('.card'))">
      </div>
      <div class="field">
        <label>Modelo</label>
        <input name="modelo" placeholder="ex: Floral Verão" oninput="gerarTitulo(this.closest('.card'))">
      </div>
      <div class="field">
        <label>Marca</label>
        <input name="marca" placeholder="ex: Zara" oninput="gerarTitulo(this.closest('.card'))">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Cor</label>
        <select name="cor" onchange="gerarTitulo(this.closest('.card'))">
          <option value="">Selecione</option>
          <option>Preto</option><option>Branco</option><option>Vermelho</option>
          <option>Azul</option><option>Rosa</option><option>Verde</option>
          <option>Amarelo</option><option>Roxo</option><option>Laranja</option>
          <option>Cinza</option><option>Bege</option><option>Marrom</option>
          <option>Vinho</option><option>Nude</option><option>Estampado</option>
          <option>Multicolorido</option>
        </select>
      </div>
      <div class="field">
        <label>Gênero</label>
        <select name="sexo" onchange="gerarTitulo(this.closest('.card'))">
          <option value="">Selecione</option>
          <option value="Feminino">Feminino</option>
          <option value="Masculino">Masculino</option>
          <option value="Unissex">Unissex</option>
        </select>
      </div>
      <div class="field">
        <label>Tamanho</label>
        <select name="tamanho">
          <option value="">Selecione</option>
          <optgroup label="Numérico">
            <option>34</option><option>36</option><option>38</option>
            <option>40</option><option>42</option><option>44</option>
            <option>46</option><option>48</option><option>50</option>
          </optgroup>
          <optgroup label="Letras">
            <option>PP</option><option>P</option><option>M</option>
            <option>G</option><option>GG</option><option>XGG</option>
          </optgroup>
          <optgroup label="Único">
            <option>Único</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Título do Anúncio (máx. 60 caracteres)</label>
      <div class="titulo-wrap">
        <input name="titulo" placeholder="Gerado automaticamente ou edite" maxlength="60" oninput="atualizarContador(this)">
        <span class="titulo-counter">0/60</span>
      </div>
    </div>

    <div class="field">
      <label>Descrição</label>
      <textarea name="descricao" placeholder="Descrição do produto (opcional)"></textarea>
    </div>

    <div class="field" style="max-width:220px">
      <label>Preço</label>
      <input name="preco" placeholder="R$ 0,00" oninput="formatarPreco(this)">
    </div>
  `;

  document.getElementById("formArea").appendChild(div);
  atualizarNumeracao();

  // Carregar atributos da categoria padrão
  const catSelect = div.querySelector('[name="categoria"]');
  onCategoriaChange(catSelect);
}

addForm();

// ─── COLETAR ATRIBUTOS EXTRAS ────────────────────────────────────────────────
function coletarExtras(card) {
  const extras = [];
  card.querySelectorAll("[data-attr-id]").forEach(el => {
    const id   = el.dataset.attrId;
    const name = el.dataset.attrName;
    if (!id) return;
    if (el.tagName === "SELECT") {
      const opt = el.options[el.selectedIndex];
      if (opt && opt.value) extras.push({ id, value_id: opt.value, value_name: opt.dataset.vname || opt.text });
    } else {
      if (el.value.trim()) extras.push({ id, value_name: el.value.trim() });
    }
  });
  return extras;
}

// ─── PUBLICAR ─────────────────────────────────────────────────────────────────
async function publicar() {
  const btn = document.getElementById("btnPublish");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Publicando...';
  document.getElementById("resultArea").innerHTML = "";

  const cards = document.querySelectorAll(".card");
  const produtos = [];
  const get = (card, n) => { const e = card.querySelector(`[name="${n}"]`); return e ? e.value.trim() : ""; };

  for (const card of cards) {
    const title    = get(card, "titulo");
    const precoRaw = get(card, "preco").replace(/\D/g, "");
    const preco    = precoRaw ? parseInt(precoRaw) / 100 : 0;
    const imagens  = ["img1","img2","img3","img4"].map(n => get(card,n)).filter(Boolean);

    if (!title || !preco || !imagens.length || !get(card,"cor") || !get(card,"tamanho") || !get(card,"sexo") || !get(card,"marca")) {
      showAlert("Preencha: título, preço, imagem, cor, tamanho, gênero e marca", "error");
      btn.disabled = false; btn.innerHTML = "Publicar tudo";
      return;
    }

    produtos.push({
      title,
      description:      get(card, "descricao"),
      category_id:      get(card, "categoria"),
      price:            preco,
      pictures:         imagens,
      marca:            get(card, "marca"),
      modelo:           get(card, "modelo"),
      cor:              get(card, "cor"),
      sexo:             get(card, "sexo"),
      tamanho:          get(card, "tamanho"),
      extra_attributes: coletarExtras(card)
    });
  }

  try {
    const res  = await fetch("/api/create-items", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ produtos, token })
    });
    const data = await res.json();
    console.log("ML Response:", data);
    renderResultados(data);

    const erros = data.filter(r => r.erro).length;
    if (!erros) showAlert(`✅ ${data.length} anúncio(s) publicado(s)!`, "success");
    else        showAlert(`⚠️ ${erros} erro(s) — veja detalhes acima`, "error");

  } catch (err) {
    showAlert("Erro de conexão: " + err.message, "error");
  }

  btn.disabled = false; btn.innerHTML = "Publicar tudo";
}

// ─── RENDERIZAR RESULTADOS ────────────────────────────────────────────────────
function renderResultados(data) {
  const area = document.getElementById("resultArea");
  area.innerHTML = "";

  const erros = data.filter(r => r.erro).length;
  const h = document.createElement("div");
  h.className = "result-header";
  h.textContent = erros === 0
    ? `✅ ${data.length} anúncio(s) publicado(s) com sucesso!`
    : `⚠️ Publicação concluída com ${erros} falha(s)`;
  area.appendChild(h);

  data.forEach(r => {
    const row = document.createElement("div");
    row.className = `result-row ${r.sucesso ? "result-ok" : "result-err"}`;

    if (r.sucesso) {
      row.innerHTML = `
        <span>✔</span>
        <div>
          <b>${r.produto}</b> — ID: ${r.id}
          ${r.link ? `<br><a class="result-link" href="${r.link}" target="_blank">Ver anúncio ↗</a>` : ""}
        </div>`;
    } else {
      let detalhe = "";
      if (r.detalhe && typeof r.detalhe === "object") {
        // Mostrar cause da ML que diz exatamente qual campo falta
        if (Array.isArray(r.detalhe.cause) && r.detalhe.cause.length > 0) {
          detalhe = r.detalhe.cause.map(c => `• ${c.message || c.code || JSON.stringify(c)}`).join("<br>");
        } else {
          detalhe = r.detalhe.message || JSON.stringify(r.detalhe, null, 2);
        }
      } else {
        detalhe = String(r.detalhe || "");
      }
      row.innerHTML = `
        <span>✖</span>
        <div style="flex:1">
          <b>${r.produto}</b>
          <div class="result-cause">${detalhe}</div>
        </div>`;
    }
    area.appendChild(row);
  });

  area.scrollIntoView({ behavior: "smooth" });
}
</script>
</body>
</html>
