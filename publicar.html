<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link rel="icon" href="https://raw.githubusercontent.com/hiagorhyanns/mercado-livre-api/29a8c4b095c3e39ee5ecf28f0e4be283621d5f61/img/conectado-ml.png">
<title>:: Publicar Anúncios ::</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { font-family: 'Inter'; box-sizing: border-box; }
body { background:#ededed; }

.container { width:900px; margin:40px auto; }

.row { display:flex; gap:10px; }

input, textarea, select {
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px;
  width:100%;
  margin-bottom:10px;
}

textarea { height:80px; }

button {
  padding:12px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

.add { background:#3483fa; color:white; }
.publish { background:#00a650; color:white; }

.card {
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:8px;
}

/* ALERT */
.alert {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:15px 25px;
  border-radius:6px;
  font-weight:bold;
  color:white;
  z-index:999;
  animation:fadeOut 4s forwards;
}

.success { background:#00a650; }
.error { background:#ff3b3b; }

@keyframes fadeOut {
  0% {opacity:1;}
  80% {opacity:1;}
  100% {opacity:0;}
}
</style>
</head>

<body>
<div class="container">

<div id="formArea"></div>

<button class="add" onclick="addForm()">Criar mais +1 anúncio</button>
<button class="publish" onclick="publicar()">Publicar anúncios em massa</button>

</div>

<script>

const token = new URLSearchParams(window.location.search).get("token");

// ALERTA
function showAlert(msg, type="success"){
  const div = document.createElement("div");
  div.className = `alert ${type}`;
  div.innerText = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 4000);
}

// PREÇO
function formatarPreco(input){
  let v = input.value.replace(/\D/g, "");
  v = (v / 100).toFixed(2);
  v = v.replace(".", ",");
  v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  input.value = "R$ " + v;
}

// TÍTULO AUTO
function gerarTitulo(card){
  const get = name => card.querySelector(`[name="${name}"]`).value;

  let titulo = `${get("produto")} ${get("modelo")} ${get("marca")} ${get("cor")} ${get("sexo")}`;
  titulo = titulo.trim().substring(0, 60);

  card.querySelector('[name="titulo"]').value = titulo;
}

// FORM
function addForm(){
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <select name="categoria">
      <option value="MLB1430">Vestidos</option>
    </select>

    <div class="row">
      <input name="img1" placeholder="Imagem 1 URL" required>
      <input name="img2" placeholder="Imagem 2 URL">
      <input name="img3" placeholder="Imagem 3 URL">
      <input name="img4" placeholder="Imagem 4 URL">
    </div>

    <div class="row">
      <input name="produto" placeholder="Produto" required oninput="gerarTitulo(this.closest('.card'))">
      <input name="modelo" placeholder="Modelo" required oninput="gerarTitulo(this.closest('.card'))">
      <input name="marca" placeholder="Marca" required oninput="gerarTitulo(this.closest('.card'))">

      <select name="cor" required onchange="gerarTitulo(this.closest('.card'))">
        <option value="">Cor</option>
        <option>Preto</option>
        <option>Branco</option>
        <option>Vermelho</option>
        <option>Azul</option>
        <option>Verde</option>
      </select>

      <select name="sexo" required onchange="gerarTitulo(this.closest('.card'))">
        <option value="">Sexo</option>
        <option>Feminino</option>
        <option>Masculino</option>
      </select>

      <select name="tamanho" required>
        <option value="">Tamanho</option>
        <option>P</option>
        <option>M</option>
        <option>G</option>
        <option>GG</option>
      </select>
    </div>

    <input name="titulo" placeholder="Nome completo do produto" maxlength="60" required>

    <textarea name="descricao"></textarea>

    <input name="preco" placeholder="Preço" oninput="formatarPreco(this)" required>
  `;

  document.getElementById("formArea").appendChild(div);
}

addForm();

// PUBLICAR
async function publicar(){

  const cards = document.querySelectorAll(".card");
  const produtos = [];

  const get = (card, name) => card.querySelector(`[name="${name}"]`).value;

  for (const card of cards) {

    const title = get(card, "titulo").trim();
    const preco = get(card, "preco").replace(/\D/g, "") / 100;
    const categoria = get(card, "categoria");

    const imagens = [
      get(card, "img1"),
      get(card, "img2"),
      get(card, "img3"),
      get(card, "img4")
    ].filter(Boolean);

    if (!title || !preco || imagens.length === 0) {
      showAlert("Preencha todos os campos obrigatórios", "error");
      return;
    }

    produtos.push({
      title,
      description: get(card, "descricao"),
      category_id: categoria,
      price: preco,
      pictures: imagens,

      produto: get(card, "produto"),
      modelo: get(card, "modelo"),
      marca: get(card, "marca"),
      cor: get(card, "cor"),
      sexo: get(card, "sexo"),
      tamanho: get(card, "tamanho")
    });
  }

  const res = await fetch("/api/create-items", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ produtos, token })
  });

  const data = await res.json();

  console.log(data);

  const erro = data.find(r => r.erro);

  if (erro) {
    console.log("Erro real:", erro.detalhe);
    showAlert("Erro ao publicar (F12)", "error");
  } else {
    showAlert("Anúncios publicados com sucesso!", "success");
  }
}

</script>

</body>
</html>
