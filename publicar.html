<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://raw.githubusercontent.com/hiagorhyanns/mercado-livre-api/29a8c4b095c3e39ee5ecf28f0e4be283621d5f61/img/conectado-ml.png">
<title>:: Publicar Anúncios ::</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { font-family: 'Inter'; box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f5; min-height: 100vh; }

.header {
  background: #fff159; padding: 14px 30px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  position: sticky; top: 0; z-index: 100;
}
.header-title { font-size: 18px; font-weight: 700; color: #333; }
.header-sub   { font-size: 13px; color: #555; margin-left: auto; }

.container { max-width: 980px; margin: 30px auto; padding: 0 20px 100px; }

.card {
  background: white; padding: 24px; margin-bottom: 16px;
  border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border: 1px solid #e8e8e8;
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px solid #f0f0f0;
}
.card-num {
  font-size: 13px; font-weight: 700; color: #3483fa;
  background: #e8f0fe; padding: 5px 14px; border-radius: 20px;
}

/* SEÇÕES */
.section {
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid #f5f5f5;
}
.section:last-child { border-bottom: none; margin-bottom: 0; }
.section-title {
  font-size: 11px; font-weight: 700; color: #3483fa;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}
.section-title span { font-size: 15px; }

.field { margin-bottom: 12px; }
.field-row { display: flex; gap: 10px; flex-wrap: wrap; }
.field-row .field { flex: 1; min-width: 140px; }

label {
  display: block; font-size: 11px; font-weight: 600;
  color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
}
.optional-tag {
  font-size: 9px; font-weight: 500; color: #aaa;
  background: #f5f5f5; border-radius: 4px;
  padding: 1px 5px; margin-left: 5px; text-transform: lowercase; letter-spacing: 0;
}

input, textarea, select {
  padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
  width: 100%; font-size: 14px; font-family: 'Inter';
  transition: border-color 0.2s; background: #fafafa; color: #333;
}
input:focus, textarea:focus, select:focus {
  border-color: #3483fa; outline: none; background: white;
}
textarea { height: 80px; resize: vertical; }

/* LISTING TYPE TOGGLE */
.listing-toggle { display: flex; gap: 10px; }
.listing-opt {
  flex: 1; border: 2px solid #ddd; border-radius: 8px;
  padding: 12px; cursor: pointer; transition: all 0.2s; text-align: center;
}
.listing-opt:hover { border-color: #3483fa; }
.listing-opt.active { border-color: #3483fa; background: #e8f0fe; }
.listing-opt.active-green { border-color: #00a650; background: #e6f7ee; }
.listing-opt input { display: none; }
.listing-opt .lo-title { font-size: 13px; font-weight: 700; color: #333; }
.listing-opt .lo-sub   { font-size: 11px; color: #888; margin-top: 2px; }

/* MULTI-SELECT CHIP */
.chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.chip {
  padding: 5px 12px; border: 1.5px solid #ddd; border-radius: 20px;
  font-size: 12px; cursor: pointer; color: #555; background: #fafafa;
  transition: all 0.15s; user-select: none;
}
.chip:hover  { border-color: #3483fa; color: #3483fa; }
.chip.active { border-color: #3483fa; background: #3483fa; color: white; }

/* TÍTULO */
.titulo-wrap { position: relative; }
.titulo-counter {
  position: absolute; right: 10px; top: 10px;
  font-size: 11px; color: #aaa; pointer-events: none;
}

/* RESULTADOS */
.result-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-radius: 6px; margin-bottom: 6px; font-size: 13px;
}
.result-ok  { background: #e8f8ef; color: #007a35; }
.result-err { background: #fff0f0; color: #cc0000; }
.result-cause {
  font-size: 11px; margin-top: 5px; line-height: 1.6; opacity: 0.9;
}
.result-link { font-size: 11px; color: #3483fa; }

/* BOTÕES */
.btn-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 1px solid #e0e0e0;
  padding: 12px 30px; display: flex; gap: 10px; justify-content: center; z-index: 200;
}
button {
  padding: 12px 24px; border: none; border-radius: 6px;
  font-weight: 600; cursor: pointer; font-size: 14px; font-family: 'Inter';
  transition: opacity 0.2s, transform 0.1s;
}
button:active { transform: scale(0.98); }
.btn-add     { background: #e8f0fe; color: #3483fa; }
.btn-publish { background: #3483fa; color: white; min-width: 200px; }
.btn-publish:disabled { background: #999; cursor: not-allowed; transform: none; }
.btn-remove  { background: transparent; color: #ccc; padding: 4px 10px; font-size: 22px; line-height: 1; }
.btn-remove:hover { color: #ff3b3b; }

.spinner {
  display: inline-block; width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.alert {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 14px 28px; border-radius: 8px; font-weight: 600; color: white;
  z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.25); white-space: nowrap;
  animation: fadeOut 5s forwards;
}
.success { background: #00a650; }
.error   { background: #e03030; }
@keyframes fadeOut { 0%,75%{opacity:1} 100%{opacity:0} }

#resultArea { margin-bottom: 20px; }
.result-header { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">🛍️</span>
  <span class="header-title">Publicar Anúncios em Massa</span>
  <span class="header-sub" id="contadorLabel">0 anúncios</span>
</div>

<div class="container">
  <div id="resultArea"></div>
  <div id="formArea"></div>
</div>

<div class="btn-bar">
  <button class="btn-add" onclick="addForm()">+ Adicionar anúncio</button>
  <button class="btn-publish" id="btnPublish" onclick="publicar()">Publicar tudo</button>
</div>

<script>
const token = new URLSearchParams(window.location.search).get("token");

// ─── DADOS FIXOS PARA VESTIDOS ─────────────────────────────────────────────
const OCASIOES = [
  "Aniversário","Calor","Casamento","Casual","Festa","Igreja",
  "Shopping","Verão","Gestante","Trabalho","Formatura","Praia"
];
const ESTILOS = ["Elegante","Casual","Romântico","Moderno","Clássico","Boho","Esportivo"];
const MATERIAIS = [
  "Viscolinho","Viscose","Algodão","Linho","Poliéster","Malha","Crepe",
  "Cetim","Renda","Duna","Oxford","Suede","Couro","Jeans"
];
const TIPOS_COMPRIMENTO = ["Curto","Midi","Longo","Mini","Maxi"];
const TIPOS_MANGA = [
  "Sem manga","Alças finas","Ombro a ombro","Meia manga",
  "Manga curta","Manga 3/4","Manga longa"
];
const TIPOS_GOLA = [
  "Decote V","Quadrado","Redondo","Canoa","Assimétrico",
  "Tomara que caia","Frente única","Laço"
];
const TIPOS_VESTIDO = [
  "Solto","Justo","Evase","Envelope","Tubinho","Chemise","Wrap"
];
const TEMPORADAS = ["Primavera/Verão","Outono/Inverno","Todas as estações"];
const IDADES    = ["Adultos","Jovem adulto","Criança"];

// ─── UTILITÁRIOS ──────────────────────────────────────────────────────────
function showAlert(msg, type = "success") {
  document.querySelectorAll(".alert").forEach(a => a.remove());
  const d = document.createElement("div");
  d.className = `alert ${type}`;
  d.innerText = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 5000);
}

function formatarPreco(input) {
  let v = input.value.replace(/\D/g, "");
  if (!v) { input.value = ""; return; }
  v = (parseInt(v) / 100).toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  input.value = "R$ " + v;
}

function gerarTitulo(card) {
  const g = n => { const e = card.querySelector(`[name="${n}"]`); return e ? e.value.trim() : ""; };
  const t = [g("produto"),g("modelo"),g("marca"),g("cor"),g("sexo")].filter(Boolean).join(" ").substring(0,60);
  const inp = card.querySelector('[name="titulo"]');
  inp.value = t;
  atualizarContador(inp);
}
function atualizarContador(input) {
  const c = input.closest(".titulo-wrap")?.querySelector(".titulo-counter");
  if (c) c.textContent = input.value.length + "/60";
}

function atualizarNumeracao() {
  document.querySelectorAll(".card").forEach((c, i) => {
    const n = c.querySelector(".card-num");
    if (n) n.textContent = `Anúncio ${i + 1}`;
  });
  document.getElementById("contadorLabel").textContent =
    document.querySelectorAll(".card").length + " anúncio(s)";
}
function removerCard(btn) { btn.closest(".card").remove(); atualizarNumeracao(); }

// ─── CHIPS MULTI-SELEÇÃO ─────────────────────────────────────────────────
function buildChips(container, items, name) {
  container.innerHTML = `<div class="chip-group" data-name="${name}">` +
    items.map(item =>
      `<div class="chip" data-value="${item}" onclick="toggleChip(this)">${item}</div>`
    ).join("") + `</div>`;
}
function toggleChip(el) { el.classList.toggle("active"); }
function getChips(card, name) {
  const g = card.querySelector(`.chip-group[data-name="${name}"]`);
  if (!g) return [];
  return [...g.querySelectorAll(".chip.active")].map(c => c.dataset.value);
}

// ─── LISTING TYPE ────────────────────────────────────────────────────────
function selectListing(card, value) {
  card.querySelectorAll(".listing-opt").forEach(o => {
    o.classList.remove("active","active-green");
  });
  const selected = card.querySelector(`.listing-opt[data-value="${value}"]`);
  if (selected) {
    selected.classList.add(value === "gold_special" ? "active" : "active-green");
  }
  card.querySelector('[name="listing_type"]').value = value;
}

// ─── ADD FORM ─────────────────────────────────────────────────────────────
function addForm() {
  const div = document.createElement("div");
  div.className = "card";
  const idx = document.querySelectorAll(".card").length + 1;

  div.innerHTML = `
    <div class="card-header">
      <span class="card-num">Anúncio ${idx}</span>
      <button class="btn-remove" onclick="removerCard(this)" title="Remover">×</button>
    </div>

    <!-- ①  TIPO DE ANÚNCIO -->
    <div class="section">
      <div class="section-title"><span>📋</span> Tipo de anúncio</div>
      <input type="hidden" name="listing_type" value="gold_special">
      <div class="listing-toggle">
        <div class="listing-opt active" data-value="gold_special" onclick="selectListing(this.closest('.card'),'gold_special')">
          <div class="lo-title">🥈 Clássico</div>
          <div class="lo-sub">gold_special · sem custo fixo</div>
        </div>
        <div class="listing-opt" data-value="gold_pro" onclick="selectListing(this.closest('.card'),'gold_pro')">
          <div class="lo-title">🥇 Premium</div>
          <div class="lo-sub">gold_pro · maior visibilidade</div>
        </div>
      </div>
    </div>

    <!-- ②  CATEGORIA -->
    <div class="section">
      <div class="section-title"><span>🏷️</span> Categoria</div>
      <div class="field">
        <select name="categoria">
          <option value="MLB1430">Vestidos (MLB1430)</option>
          <option value="MLB1196">Blusas e Camisetas Femininas (MLB1196)</option>
          <option value="MLB1292">Calças Femininas (MLB1292)</option>
          <option value="MLB1294">Saias (MLB1294)</option>
          <option value="MLB1435">Macacões e Macaquinhos (MLB1435)</option>
          <option value="MLB1182">Conjuntos Femininos (MLB1182)</option>
          <option value="MLB1269">Camisas Masculinas (MLB1269)</option>
          <option value="MLB1273">Calças Masculinas (MLB1273)</option>
        </select>
      </div>
    </div>

    <!-- ③  IMAGENS -->
    <div class="section">
      <div class="section-title"><span>🖼️</span> Imagens</div>
      <div class="field-row">
        <div class="field"><label>Imagem 1 <span style="color:red">*</span></label><input name="img1" placeholder="https://..."></div>
        <div class="field"><label>Imagem 2 <span class="optional-tag">opcional</span></label><input name="img2" placeholder="https://..."></div>
        <div class="field"><label>Imagem 3 <span class="optional-tag">opcional</span></label><input name="img3" placeholder="https://..."></div>
        <div class="field"><label>Imagem 4 <span class="optional-tag">opcional</span></label><input name="img4" placeholder="https://..."></div>
      </div>
    </div>

    <!-- ④  DADOS PRINCIPAIS -->
    <div class="section">
      <div class="section-title"><span>👗</span> Dados do produto</div>

      <div class="field-row">
        <div class="field">
          <label>Produto <span style="color:red">*</span></label>
          <input name="produto" placeholder="ex: Vestido" oninput="gerarTitulo(this.closest('.card'))">
        </div>
        <div class="field">
          <label>Modelo <span class="optional-tag">opcional</span></label>
          <input name="modelo" placeholder="ex: Floral Longo" oninput="gerarTitulo(this.closest('.card'))">
        </div>
        <div class="field">
          <label>Marca <span style="color:red">*</span></label>
          <input name="marca" placeholder="ex: Zara" oninput="gerarTitulo(this.closest('.card'))">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Cor <span style="color:red">*</span></label>
          <select name="cor" onchange="gerarTitulo(this.closest('.card'))">
            <option value="">Selecione</option>
            <option>Preto</option><option>Branco</option><option>Vermelho</option>
            <option>Azul</option><option>Rosa</option><option>Verde</option>
            <option>Amarelo</option><option>Roxo</option><option>Laranja</option>
            <option>Cinza</option><option>Bege</option><option>Marrom</option>
            <option>Vinho</option><option>Nude</option><option>Estampado</option>
            <option>Multicolorido</option>
          </select>
        </div>
        <div class="field">
          <label>Gênero <span style="color:red">*</span></label>
          <select name="sexo" onchange="gerarTitulo(this.closest('.card'))">
            <option value="">Selecione</option>
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
            <option value="Unissex">Unissex</option>
          </select>
        </div>
        <div class="field">
          <label>Tamanho <span style="color:red">*</span></label>
          <select name="tamanho">
            <option value="">Selecione</option>
            <optgroup label="Numérico">
              <option>34</option><option>36</option><option>38</option>
              <option>40</option><option>42</option><option>44</option>
              <option>46</option><option>48</option><option>50</option>
            </optgroup>
            <optgroup label="Letras">
              <option>PP</option><option>P</option><option>M</option>
              <option>G</option><option>GG</option><option>XGG</option>
            </optgroup>
            <option>Único</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ⑤  CARACTERÍSTICAS VESTIDO -->
    <div class="section">
      <div class="section-title"><span>✨</span> Características do vestido</div>

      <div class="field-row">
        <div class="field">
          <label>Material principal <span class="optional-tag">opcional</span></label>
          <select name="material">
            <option value="">Selecione</option>
            ${MATERIAIS.map(m => `<option>${m}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label>Tipo de comprimento <span class="optional-tag">opcional</span></label>
          <select name="tipo_comprimento">
            <option value="">Selecione</option>
            ${TIPOS_COMPRIMENTO.map(m => `<option>${m}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label>Tipo de manga <span class="optional-tag">opcional</span></label>
          <select name="tipo_manga">
            <option value="">Selecione</option>
            ${TIPOS_MANGA.map(m => `<option>${m}</option>`).join("")}
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Tipo de gola <span class="optional-tag">opcional</span></label>
          <select name="tipo_gola">
            <option value="">Selecione</option>
            ${TIPOS_GOLA.map(m => `<option>${m}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label>Tipo de vestido <span class="optional-tag">opcional</span></label>
          <select name="tipo_vestido">
            <option value="">Selecione</option>
            ${TIPOS_VESTIDO.map(m => `<option>${m}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label>Temporada <span class="optional-tag">opcional</span></label>
          <select name="temporada">
            <option value="">Selecione</option>
            ${TEMPORADAS.map(m => `<option>${m}</option>`).join("")}
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Faixa etária <span class="optional-tag">opcional</span></label>
          <select name="faixa_etaria">
            <option value="">Selecione</option>
            ${IDADES.map(m => `<option>${m}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label>Apto para gestante <span class="optional-tag">opcional</span></label>
          <select name="gestante">
            <option value="">Selecione</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Ocasiões <span class="optional-tag">opcional · múltipla escolha</span></label>
        <div id="chips-ocasioes-${idx}" class="chips-wrap"></div>
      </div>

      <div class="field">
        <label>Estilos <span class="optional-tag">opcional · múltipla escolha</span></label>
        <div id="chips-estilos-${idx}" class="chips-wrap"></div>
      </div>
    </div>

    <!-- ⑥  TÍTULO E DESCRIÇÃO -->
    <div class="section">
      <div class="section-title"><span>📝</span> Título e descrição</div>

      <div class="field">
        <label>Título <span style="color:red">*</span> (máx. 60 caracteres)</label>
        <div class="titulo-wrap">
          <input name="titulo" placeholder="Gerado automaticamente ou edite" maxlength="60" oninput="atualizarContador(this)">
          <span class="titulo-counter">0/60</span>
        </div>
      </div>

      <div class="field">
        <label>Descrição <span class="optional-tag">opcional</span></label>
        <textarea name="descricao" placeholder="Detalhe o produto: tecido, caimento, cuidados, etc."></textarea>
      </div>
    </div>

    <!-- ⑦  PREÇO, ESTOQUE, SKU, GARANTIA -->
    <div class="section">
      <div class="section-title"><span>💰</span> Preço e estoque</div>

      <div class="field-row">
        <div class="field">
          <label>Preço <span style="color:red">*</span></label>
          <input name="preco" placeholder="R$ 0,00" oninput="formatarPreco(this)">
        </div>
        <div class="field">
          <label>Estoque (qtd) <span style="color:red">*</span></label>
          <input name="quantidade" type="number" min="1" value="10" placeholder="10">
        </div>
        <div class="field">
          <label>SKU <span class="optional-tag">opcional</span></label>
          <input name="sku" placeholder="Código interno do produto">
        </div>
        <div class="field">
          <label>Garantia <span class="optional-tag">opcional</span></label>
          <input name="garantia" placeholder="ex: 30 dias garantia de fábrica">
        </div>
      </div>
    </div>

    <!-- ⑧  DIMENSÕES E PESO -->
    <div class="section">
      <div class="section-title"><span>📦</span> Dimensões e peso <span class="optional-tag" style="font-size:10px;letter-spacing:0">opcional</span></div>
      <div class="field-row">
        <div class="field">
          <label>Peso (kg)</label>
          <input name="peso_kg" type="number" step="0.01" placeholder="ex: 0.5">
        </div>
        <div class="field">
          <label>Largura (cm)</label>
          <input name="largura_cm" type="number" placeholder="ex: 30">
        </div>
        <div class="field">
          <label>Altura (cm)</label>
          <input name="altura_cm" type="number" placeholder="ex: 10">
        </div>
        <div class="field">
          <label>Profundidade (cm)</label>
          <input name="profundidade_cm" type="number" placeholder="ex: 5">
        </div>
      </div>
    </div>
  `;

  document.getElementById("formArea").appendChild(div);
  atualizarNumeracao();

  // Montar chips
  buildChips(div.querySelector(`#chips-ocasioes-${idx}`), OCASIOES, "ocasioes");
  buildChips(div.querySelector(`#chips-estilos-${idx}`),  ESTILOS,  "estilos");
}

addForm();

// ─── MONTAR EXTRA_ATTRIBUTES ──────────────────────────────────────────────
function montarExtras(card) {
  const g = n => { const e = card.querySelector(`[name="${n}"]`); return e ? e.value.trim() : ""; };
  const extras = [];

  const maybe = (id, val) => { if (val) extras.push({ id, value_name: val }); };

  maybe("MAIN_MATERIAL",       g("material"));
  maybe("LENGTH_TYPE",         g("tipo_comprimento"));
  maybe("SLEEVE_TYPE",         g("tipo_manga"));
  maybe("COLLAR_TYPE",         g("tipo_gola"));
  maybe("DRESS_TYPE",          g("tipo_vestido"));
  maybe("LAUNCH_SEASON",       g("temporada"));
  maybe("AGE_GROUP",           g("faixa_etaria"));
  maybe("IS_FOR_PREGNANT",     g("gestante"));

  // Multi-value (cada ocasião/estilo = atributo separado com mesmo id)
  const ocasioes = getChips(card, "ocasioes");
  if (ocasioes.length > 0) {
    extras.push({ id: "OCCASION", value_name: ocasioes.join(", ") });
  }
  const estilos = getChips(card, "estilos");
  if (estilos.length > 0) {
    extras.push({ id: "STYLE", value_name: estilos.join(", ") });
  }

  return extras;
}

// ─── PUBLICAR ─────────────────────────────────────────────────────────────
async function publicar() {
  const btn = document.getElementById("btnPublish");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Publicando...';
  document.getElementById("resultArea").innerHTML = "";

  const cards = document.querySelectorAll(".card");
  const produtos = [];
  const get = (card, n) => { const e = card.querySelector(`[name="${n}"]`); return e ? e.value.trim() : ""; };

  for (const card of cards) {
    const title    = get(card, "titulo");
    const precoRaw = get(card, "preco").replace(/\D/g, "");
    const preco    = precoRaw ? parseInt(precoRaw) / 100 : 0;
    const imagens  = ["img1","img2","img3","img4"].map(n => get(card,n)).filter(Boolean);
    const qtd      = parseInt(get(card, "quantidade")) || 10;

    // Validação obrigatórios
    if (!title) { showAlert("Preencha o título do anúncio", "error"); btn.disabled=false; btn.innerHTML="Publicar tudo"; return; }
    if (!preco)  { showAlert("Preencha o preço do anúncio", "error"); btn.disabled=false; btn.innerHTML="Publicar tudo"; return; }
    if (!imagens.length) { showAlert("Adicione ao menos 1 imagem", "error"); btn.disabled=false; btn.innerHTML="Publicar tudo"; return; }
    if (!get(card,"marca"))   { showAlert("Preencha a marca", "error"); btn.disabled=false; btn.innerHTML="Publicar tudo"; return; }
    if (!get(card,"cor"))     { showAlert("Selecione a cor", "error"); btn.disabled=false; btn.innerHTML="Publicar tudo"; return; }
    if (!get(card,"tamanho")) { showAlert("Selecione o tamanho", "error"); btn.disabled=false; btn.innerHTML="Publicar tudo"; return; }
    if (!get(card,"sexo"))    { showAlert("Selecione o gênero", "error"); btn.disabled=false; btn.innerHTML="Publicar tudo"; return; }

    produtos.push({
      title,
      description:      get(card, "descricao"),
      category_id:      get(card, "categoria"),
      listing_type:     get(card, "listing_type") || "gold_special",
      price:            preco,
      quantidade:       qtd,
      pictures:         imagens,
      marca:            get(card, "marca"),
      modelo:           get(card, "modelo"),
      cor:              get(card, "cor"),
      sexo:             get(card, "sexo"),
      tamanho:          get(card, "tamanho"),
      sku:              get(card, "sku"),
      garantia:         get(card, "garantia"),
      peso_kg:          get(card, "peso_kg"),
      largura_cm:       get(card, "largura_cm"),
      altura_cm:        get(card, "altura_cm"),
      profundidade_cm:  get(card, "profundidade_cm"),
      extra_attributes: montarExtras(card)
    });
  }

  try {
    const res  = await fetch("/api/create-items", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ produtos, token })
    });
    const data = await res.json();
    console.log("ML Response:", data);
    renderResultados(data);

    const erros = data.filter(r => r.erro).length;
    if (!erros) showAlert(`✅ ${data.length} anúncio(s) publicado(s) com sucesso!`, "success");
    else        showAlert(`⚠️ ${erros} erro(s) — veja detalhes acima`, "error");

  } catch (err) {
    showAlert("Erro de conexão: " + err.message, "error");
    console.error(err);
  }

  btn.disabled = false;
  btn.innerHTML = "Publicar tudo";
}

// ─── RENDERIZAR RESULTADOS ────────────────────────────────────────────────
function renderResultados(data) {
  const area = document.getElementById("resultArea");
  area.innerHTML = "";

  const erros = data.filter(r => r.erro).length;
  const h = document.createElement("div");
  h.className = "result-header";
  h.textContent = erros === 0
    ? `✅ ${data.length} anúncio(s) publicado(s) com sucesso!`
    : `⚠️ Publicação concluída com ${erros} falha(s)`;
  area.appendChild(h);

  data.forEach(r => {
    const row = document.createElement("div");
    row.className = `result-row ${r.sucesso ? "result-ok" : "result-err"}`;

    if (r.sucesso) {
      row.innerHTML = `
        <span>✔</span>
        <div>
          <b>${r.produto}</b> — ID: ${r.id}
          ${r.link ? `<br><a class="result-link" href="${r.link}" target="_blank">🔗 Ver anúncio no ML</a>` : ""}
        </div>`;
    } else {
      let detalhe = "";
      if (r.detalhe && typeof r.detalhe === "object") {
        if (Array.isArray(r.detalhe.cause) && r.detalhe.cause.length > 0) {
          detalhe = r.detalhe.cause.map(c => `• ${c.message || c.code || JSON.stringify(c)}`).join("<br>");
        } else {
          detalhe = r.detalhe.message || JSON.stringify(r.detalhe, null, 2);
        }
      } else {
        detalhe = String(r.detalhe || "");
      }
      row.innerHTML = `
        <span>✖</span>
        <div style="flex:1">
          <b>${r.produto}</b>
          <div class="result-cause">${detalhe}</div>
        </div>`;
    }
    area.appendChild(row);
  });

  area.scrollIntoView({ behavior: "smooth" });
}
</script>
