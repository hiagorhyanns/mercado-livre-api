<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://raw.githubusercontent.com/hiagorhyanns/mercado-livre-api/29a8c4b095c3e39ee5ecf28f0e4be283621d5f61/img/conectado-ml.png">
<title>:: Publicar Anúncios ::</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter';box-sizing:border-box;margin:0;padding:0}
body{background:#f0f2f5;min-height:100vh}

.header{background:#fff159;padding:14px 30px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.12);position:sticky;top:0;z-index:100}
.header-title{font-size:18px;font-weight:700;color:#333}
.header-sub{font-size:13px;color:#555;margin-left:auto}

.container{max-width:980px;margin:30px auto;padding:0 20px 100px}

.card{background:white;padding:24px;margin-bottom:16px;border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid #e8e8e8}
.card-header{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #f0f0f0}
.card-num{font-size:13px;font-weight:700;color:#3483fa;background:#e8f0fe;padding:5px 14px;border-radius:20px}

.sec{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid #f5f5f5}
.sec:last-child{border-bottom:none;margin-bottom:0}
.sec-title{font-size:11px;font-weight:700;color:#3483fa;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:6px}

.f{margin-bottom:12px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row .f{flex:1;min-width:140px}

label{display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.4px}
.opt{font-size:9px;font-weight:500;color:#aaa;background:#f5f5f5;border-radius:4px;
  padding:1px 5px;margin-left:4px;text-transform:lowercase;letter-spacing:0}
.req{color:#e03030;margin-left:2px}

input,textarea,select{padding:10px 12px;border:1px solid #ddd;border-radius:6px;width:100%;
  font-size:14px;font-family:'Inter';transition:border-color .2s;background:#fafafa;color:#333}
input:focus,textarea:focus,select:focus{border-color:#3483fa;outline:none;background:white}
textarea{height:80px;resize:vertical}

/* TOGGLE */
.tg-group{display:flex;gap:8px;flex-wrap:wrap}
.tg-opt{flex:1;min-width:100px;border:2px solid #ddd;border-radius:8px;
  padding:11px 10px;cursor:pointer;transition:all .18s;text-align:center}
.tg-opt:hover{border-color:#3483fa}
.tg-opt.blue{border-color:#3483fa;background:#e8f0fe}
.tg-opt.green{border-color:#00a650;background:#e6f7ee}
.tg-opt.orange{border-color:#f57c00;background:#fff3e0}
.tg-title{font-size:13px;font-weight:700;color:#333}
.tg-sub{font-size:10px;color:#888;margin-top:2px}

/* SWITCH */
.sw-row{display:flex;align-items:center;gap:10px;cursor:pointer;margin-top:6px}
.sw{position:relative;width:42px;height:24px}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#ccc;border-radius:24px;transition:.3s}
.sl::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;
  background:white;border-radius:50%;transition:.3s}
.sw input:checked+.sl{background:#00a650}
.sw input:checked+.sl::before{transform:translateX(18px)}
.sw-lbl{font-size:13px;color:#444;font-weight:500}

/* CHIPS */
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{padding:5px 12px;border:1.5px solid #ddd;border-radius:20px;font-size:12px;
  cursor:pointer;color:#555;background:#fafafa;transition:all .15s;user-select:none}
.chip:hover{border-color:#3483fa;color:#3483fa}
.chip.on{border-color:#3483fa;background:#3483fa;color:white}

/* TÍTULO */
.tw{position:relative}
.tc{position:absolute;right:10px;top:10px;font-size:11px;color:#aaa;pointer-events:none}

/* RESULT */
.rh{font-size:15px;font-weight:700;color:#333;margin-bottom:12px}
.rr{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:6px;
  margin-bottom:6px;font-size:13px}
.rr.ok{background:#e8f8ef;color:#007a35;border-left:3px solid #00a650}
.rr.er{background:#fff0f0;color:#cc0000;border-left:3px solid #e03030}
.rc{font-size:11px;margin-top:5px;line-height:1.8}
.rl{font-size:11px;color:#3483fa}
.dbg{background:#1a1a2e;color:#e0e0e0;font-family:monospace;font-size:11px;
  border-radius:6px;padding:12px 14px;margin-top:8px;white-space:pre-wrap;
  word-break:break-all;max-height:200px;overflow-y:auto;display:none}
.dt{font-size:10px;color:#3483fa;cursor:pointer;margin-top:4px;display:inline-block}

/* BOTÃO */
.btn-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e0e0e0;
  padding:12px 30px;display:flex;gap:10px;justify-content:center;z-index:200}
button{padding:12px 24px;border:none;border-radius:6px;font-weight:600;cursor:pointer;
  font-size:14px;font-family:'Inter';transition:opacity .2s,transform .1s}
button:active{transform:scale(.98)}
.btn-add{background:#e8f0fe;color:#3483fa}
.btn-pub{background:#3483fa;color:white;min-width:200px}
.btn-pub:disabled{background:#999;cursor:not-allowed;transform:none}
.btn-rm{background:transparent;color:#ccc;padding:4px 10px;font-size:22px;line-height:1}
.btn-rm:hover{color:#e03030}
.sp{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);
  border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.al{position:fixed;top:20px;left:50%;transform:translateX(-50%);
  padding:14px 28px;border-radius:8px;font-weight:600;color:white;z-index:999;
  box-shadow:0 4px 20px rgba(0,0,0,.25);animation:fo 5s forwards}
.al.ok{background:#00a650}
.al.er{background:#e03030}
@keyframes fo{0%,75%{opacity:1}100%{opacity:0}}

#resultArea{margin-bottom:20px}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">🛍️</span>
  <span class="header-title">Publicar Anúncios em Massa</span>
  <span class="header-sub" id="cLabel">0 anúncios</span>
</div>

<div class="container">
  <div id="resultArea"></div>
  <div id="formArea"></div>
</div>

<div class="btn-bar">
  <button class="btn-add" onclick="addForm()">+ Adicionar anúncio</button>
  <button class="btn-pub" id="btnPub" onclick="publicar()">Publicar tudo</button>
</div>

<script>
const token = new URLSearchParams(window.location.search).get("token");

/* ── LISTAS ──────────────────────────────────────────────────────────── */
const OCASIOES  = ["Aniversário","Calor","Casamento","Casual","Festa","Igreja","Shopping","Verão","Gestante","Trabalho","Formatura","Praia"];
const ESTILOS   = ["Elegante","Casual","Romântico","Moderno","Clássico","Boho","Esportivo"];
const MATERIAIS = ["Viscolinho","Viscose","Algodão","Linho","Poliéster","Malha","Crepe","Cetim","Renda","Duna","Oxford","Jeans"];
const COMPRIM   = ["Curto","Midi","Longo","Mini","Maxi"];
const MANGAS    = ["Sem manga","Alças finas","Ombro a ombro","Meia manga","Manga curta","Manga 3/4","Manga longa"];
const GOLAS     = ["Decote V","Quadrado","Redondo","Canoa","Assimétrico","Tomara que caia","Frente única","Laço"];
const TIPOS_V   = ["Solto","Justo","Evasê","Envelope","Tubinho","Chemise","Wrap"];
const TEMP      = ["Primavera/Verão","Outono/Inverno","Todas as estações"];
const IDADES    = ["Adultos","Jovem adulto","Criança"];

/* ── TRADUÇÃO ERROS ML ───────────────────────────────────────────────── */
const TRAD = {
  "family_name":                     "Campo 'family_name' obrigatório na raiz",
  "price":                           "Preço ausente dentro de variations",
  "available_quantity":              "Quantidade ausente dentro de variations",
  "attribute_combinations":          "Cor/Tamanho ausentes em variations",
  "The field variations is invalid": "Variations inválido — family_name ausente",
  "The body does not contains":      "Body sem campo(s) obrigatório(s)",
  "item variation with errors":      "Variação com erros",
  "invalid_body":                    "Body da requisição inválido",
  "missing_field":                   "Campo obrigatório ausente",
  "invalid_field":                   "Campo com valor inválido",
  "unauthorized":                    "Token inválido ou expirado — reconecte",
  "invalid pictures":                "URL de imagem inválida",
  "The resource is not reachable":   "Imagem inacessível — verifique o link",
  "listing_type":                    "Tipo de anúncio inválido",
  "cannot post item":                "Sem permissão para publicar nesta categoria"
};
function traduzir(txt){
  if(!txt) return txt;
  for(const[en,pt] of Object.entries(TRAD)) if(txt.toLowerCase().includes(en.toLowerCase())) return pt;
  return txt;
}

/* ── UTILS ───────────────────────────────────────────────────────────── */
function showAlert(msg,type="ok"){
  document.querySelectorAll(".al").forEach(a=>a.remove());
  const d=document.createElement("div");
  d.className=`al ${type}`;d.innerText=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),5000);
}
function fmtPreco(inp){
  let v=inp.value.replace(/\D/g,"");
  if(!v){inp.value="";return}
  v=(parseInt(v)/100).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
  inp.value="R$ "+v;
}
function gerarTitulo(card){
  const g=n=>{const e=card.querySelector(`[name="${n}"]`);return e?e.value.trim():""};
  const t=[g("produto"),g("modelo"),g("marca"),g("cor"),g("sexo")].filter(Boolean).join(" ").substring(0,60);
  const inp=card.querySelector('[name="titulo"]');inp.value=t;updCount(inp);
}
function updCount(inp){
  const c=inp.closest(".tw")?.querySelector(".tc");if(c)c.textContent=inp.value.length+"/60";
}
function updN(){
  document.querySelectorAll(".card").forEach((c,i)=>{const n=c.querySelector(".card-num");if(n)n.textContent=`Anúncio ${i+1}`});
  document.getElementById("cLabel").textContent=document.querySelectorAll(".card").length+" anúncio(s)";
}
function rmCard(btn){btn.closest(".card").remove();updN()}

/* ── CHIPS ───────────────────────────────────────────────────────────── */
function buildChips(wrap,items,name){
  wrap.innerHTML=`<div class="chip-group" data-name="${name}">`+
    items.map(i=>`<div class="chip" data-value="${i}" onclick="this.classList.toggle('on')">${i}</div>`).join("")+`</div>`;
}
function getChips(card,name){
  const g=card.querySelector(`.chip-group[data-name="${name}"]`);
  return g?[...g.querySelectorAll(".chip.on")].map(c=>c.dataset.value):[];
}

/* ── TOGGLE ──────────────────────────────────────────────────────────── */
function selToggle(card,name,value,cls){
  const grp=card.querySelector(`.tg-group[data-name="${name}"]`);
  if(!grp)return;
  grp.querySelectorAll(".tg-opt").forEach(o=>o.className="tg-opt");
  const opt=grp.querySelector(`[data-value="${value}"]`);
  if(opt)opt.classList.add(cls);
  card.querySelector(`[name="${name}"]`).value=value;
}

/* ── ADD FORM ─────────────────────────────────────────────────────────── */
function addForm(){
  const div=document.createElement("div");
  div.className="card";
  const idx=document.querySelectorAll(".card").length+1;

  div.innerHTML=`
  <div class="card-header">
    <span class="card-num">Anúncio ${idx}</span>
    <button class="btn-rm" onclick="rmCard(this)">×</button>
  </div>

  <!-- TIPO DE ANÚNCIO -->
  <div class="sec">
    <div class="sec-title">📋 Tipo de anúncio</div>
    <input type="hidden" name="listing_type" value="gold_special">
    <div class="tg-group" data-name="listing_type">
      <div class="tg-opt blue" data-value="gold_special" onclick="selToggle(this.closest('.card'),'listing_type','gold_special','blue')">
        <div class="tg-title">🥈 Clássico</div><div class="tg-sub">gold_special</div>
      </div>
      <div class="tg-opt" data-value="gold_pro" onclick="selToggle(this.closest('.card'),'listing_type','gold_pro','green')">
        <div class="tg-title">🥇 Premium</div><div class="tg-sub">gold_pro</div>
      </div>
    </div>
  </div>

  <!-- CONDIÇÃO -->
  <div class="sec">
    <div class="sec-title">🔖 Condição</div>
    <input type="hidden" name="condition" value="new">
    <div class="tg-group" data-name="condition">
      <div class="tg-opt blue" data-value="new" onclick="selToggle(this.closest('.card'),'condition','new','blue')">
        <div class="tg-title">✨ Novo</div><div class="tg-sub">Produto novo</div>
      </div>
      <div class="tg-opt" data-value="used" onclick="selToggle(this.closest('.card'),'condition','used','orange')">
        <div class="tg-title">♻️ Usado</div><div class="tg-sub">Produto usado</div>
      </div>
    </div>
  </div>

  <!-- CATEGORIA -->
  <div class="sec">
    <div class="sec-title">🏷️ Categoria</div>
    <select name="categoria">
      <option value="MLB1430">Vestidos (MLB1430)</option>
      <option value="MLB1196">Blusas e Camisetas Femininas (MLB1196)</option>
      <option value="MLB1292">Calças Femininas (MLB1292)</option>
      <option value="MLB1294">Saias (MLB1294)</option>
      <option value="MLB1435">Macacões e Macaquinhos (MLB1435)</option>
      <option value="MLB1182">Conjuntos Femininos (MLB1182)</option>
      <option value="MLB1269">Camisas Masculinas (MLB1269)</option>
      <option value="MLB1273">Calças Masculinas (MLB1273)</option>
    </select>
  </div>

  <!-- IMAGENS -->
  <div class="sec">
    <div class="sec-title">🖼️ Imagens</div>
    <div class="row">
      <div class="f"><label>Imagem 1 <span class="req">*</span></label><input name="img1" placeholder="https://..."></div>
      <div class="f"><label>Imagem 2 <span class="opt">opcional</span></label><input name="img2" placeholder="https://..."></div>
      <div class="f"><label>Imagem 3 <span class="opt">opcional</span></label><input name="img3" placeholder="https://..."></div>
      <div class="f"><label>Imagem 4 <span class="opt">opcional</span></label><input name="img4" placeholder="https://..."></div>
    </div>
  </div>

  <!-- DADOS PRINCIPAIS -->
  <div class="sec">
    <div class="sec-title">👗 Dados do produto</div>
    <div class="row">
      <div class="f"><label>Produto <span class="req">*</span></label><input name="produto" placeholder="ex: Vestido" oninput="gerarTitulo(this.closest('.card'))"></div>
      <div class="f"><label>Modelo <span class="opt">opcional</span></label><input name="modelo" placeholder="ex: Floral Longo" oninput="gerarTitulo(this.closest('.card'))"></div>
      <div class="f"><label>Marca <span class="req">*</span></label><input name="marca" placeholder="ex: Zara" oninput="gerarTitulo(this.closest('.card'))"></div>
    </div>
    <div class="row">
      <div class="f">
        <label>Cor <span class="req">*</span></label>
        <select name="cor" onchange="gerarTitulo(this.closest('.card'))">
          <option value="">Selecione</option>
          <option>Preto</option><option>Branco</option><option>Vermelho</option>
          <option>Azul</option><option>Rosa</option><option>Verde</option>
          <option>Amarelo</option><option>Roxo</option><option>Laranja</option>
          <option>Cinza</option><option>Bege</option><option>Marrom</option>
          <option>Vinho</option><option>Nude</option><option>Estampado</option>
          <option>Multicolorido</option>
        </select>
      </div>
      <div class="f">
        <label>Gênero <span class="req">*</span></label>
        <select name="sexo" onchange="gerarTitulo(this.closest('.card'))">
          <option value="">Selecione</option>
          <option value="Feminino">Feminino</option>
          <option value="Masculino">Masculino</option>
          <option value="Unissex">Unissex</option>
        </select>
      </div>
      <div class="f">
        <label>Tamanho <span class="req">*</span></label>
        <select name="tamanho">
          <option value="">Selecione</option>
          <optgroup label="Numérico"><option>34</option><option>36</option><option>38</option><option>40</option><option>42</option><option>44</option><option>46</option><option>48</option><option>50</option></optgroup>
          <optgroup label="Letras"><option>PP</option><option>P</option><option>M</option><option>G</option><option>GG</option><option>XGG</option></optgroup>
          <option>Único</option>
        </select>
      </div>
    </div>
  </div>

  <!-- CARACTERÍSTICAS VESTIDO -->
  <div class="sec">
    <div class="sec-title">✨ Características <span class="opt" style="font-size:9px">todos opcionais</span></div>
    <div class="row">
      <div class="f"><label>Material</label><select name="material"><option value="">Selecione</option>${MATERIAIS.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div class="f"><label>Comprimento</label><select name="tipo_comprimento"><option value="">Selecione</option>${COMPRIM.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div class="f"><label>Tipo de manga</label><select name="tipo_manga"><option value="">Selecione</option>${MANGAS.map(m=>`<option>${m}</option>`).join("")}</select></div>
    </div>
    <div class="row">
      <div class="f"><label>Tipo de gola</label><select name="tipo_gola"><option value="">Selecione</option>${GOLAS.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div class="f"><label>Tipo de vestido</label><select name="tipo_vestido"><option value="">Selecione</option>${TIPOS_V.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div class="f"><label>Temporada</label><select name="temporada"><option value="">Selecione</option>${TEMP.map(m=>`<option>${m}</option>`).join("")}</select></div>
    </div>
    <div class="row">
      <div class="f"><label>Faixa etária</label><select name="faixa_etaria"><option value="">Selecione</option>${IDADES.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div class="f"><label>Apto gestante</label><select name="gestante"><option value="">Selecione</option><option value="Sim">Sim</option><option value="Não">Não</option></select></div>
    </div>
    <div class="f"><label>Ocasiões</label><div id="oc-${idx}"></div></div>
    <div class="f"><label>Estilos</label><div id="es-${idx}"></div></div>
  </div>

  <!-- TÍTULO E DESCRIÇÃO -->
  <div class="sec">
    <div class="sec-title">📝 Título e descrição</div>
    <div class="f">
      <label>Título <span class="req">*</span> (máx. 60 caracteres)</label>
      <div class="tw">
        <input name="titulo" placeholder="Gerado automaticamente ou edite" maxlength="60" oninput="updCount(this)">
        <span class="tc">0/60</span>
      </div>
    </div>
    <div class="f">
      <label>Descrição <span class="opt">opcional</span></label>
      <textarea name="descricao" placeholder="Detalhe o produto: tecido, caimento, cuidados, etc."></textarea>
    </div>
  </div>

  <!-- PREÇO, ESTOQUE, FRETE, SKU, GARANTIA -->
  <div class="sec">
    <div class="sec-title">💰 Preço e estoque</div>
    <div class="row">
      <div class="f"><label>Preço <span class="req">*</span></label><input name="preco" placeholder="R$ 0,00" oninput="fmtPreco(this)"></div>
      <div class="f"><label>Estoque <span class="req">*</span></label><input name="quantidade" type="number" min="1" value="10"></div>
      <div class="f"><label>SKU <span class="opt">opcional</span></label><input name="sku" placeholder="Código interno"></div>
      <div class="f"><label>Garantia <span class="opt">opcional</span></label><input name="garantia" placeholder="ex: 30 dias"></div>
    </div>
    <label class="sw-row">
      <span class="sw"><input type="checkbox" name="frete_gratis"><span class="sl"></span></span>
      <span class="sw-lbl">🚚 Oferecer frete grátis</span>
    </label>
  </div>

  <!-- DIMENSÕES -->
  <div class="sec">
    <div class="sec-title">📦 Dimensões e peso <span class="opt" style="font-size:9px">todos opcionais</span></div>
    <div class="row">
      <div class="f"><label>Peso (kg)</label><input name="peso_kg" type="number" step="0.01" placeholder="0.3"></div>
      <div class="f"><label>Largura (cm)</label><input name="largura_cm" type="number" placeholder="30"></div>
      <div class="f"><label>Altura (cm)</label><input name="altura_cm" type="number" placeholder="10"></div>
      <div class="f"><label>Profundidade (cm)</label><input name="profundidade_cm" type="number" placeholder="5"></div>
    </div>
  </div>
  `;

  document.getElementById("formArea").appendChild(div);
  updN();
  buildChips(div.querySelector(`#oc-${idx}`), OCASIOES, "ocasioes");
  buildChips(div.querySelector(`#es-${idx}`), ESTILOS,  "estilos");
}

addForm();

/* ── EXTRAS ──────────────────────────────────────────────────────────── */
function montarExtras(card){
  const g=n=>{const e=card.querySelector(`[name="${n}"]`);return e?e.value.trim():""};
  const extras=[];
  const maybe=(id,val)=>{if(val)extras.push({id,value_name:val})};
  maybe("MAIN_MATERIAL",   g("material"));
  maybe("LENGTH_TYPE",     g("tipo_comprimento"));
  maybe("SLEEVE_TYPE",     g("tipo_manga"));
  maybe("COLLAR_TYPE",     g("tipo_gola"));
  maybe("DRESS_TYPE",      g("tipo_vestido"));
  maybe("LAUNCH_SEASON",   g("temporada"));
  maybe("AGE_GROUP",       g("faixa_etaria"));
  maybe("IS_FOR_PREGNANT", g("gestante"));
  const oc=getChips(card,"ocasioes");if(oc.length)extras.push({id:"OCCASION",value_name:oc.join(", ")});
  const es=getChips(card,"estilos");if(es.length)extras.push({id:"STYLE",value_name:es.join(", ")});
  return extras;
}

/* ── PUBLICAR ────────────────────────────────────────────────────────── */
async function publicar(){
  const btn=document.getElementById("btnPub");
  btn.disabled=true;btn.innerHTML='<span class="sp"></span> Publicando...';
  document.getElementById("resultArea").innerHTML="";

  const cards=document.querySelectorAll(".card");
  const produtos=[];
  const get=(card,n)=>{const e=card.querySelector(`[name="${n}"]`);return e?e.value.trim():""};

  for(const card of cards){
    const title    = get(card,"titulo");
    const precoRaw = get(card,"preco").replace(/\D/g,"");
    const preco    = precoRaw?parseInt(precoRaw)/100:0;
    const imagens  = ["img1","img2","img3","img4"].map(n=>get(card,n)).filter(Boolean);
    const qtd      = parseInt(get(card,"quantidade"))||10;
    const freteEl  = card.querySelector('[name="frete_gratis"]');

    if(!title)         {showAlert("Preencha o título","er");btn.disabled=false;btn.innerHTML="Publicar tudo";return}
    if(!preco)         {showAlert("Preencha o preço","er");btn.disabled=false;btn.innerHTML="Publicar tudo";return}
    if(!imagens.length){showAlert("Adicione ao menos 1 imagem","er");btn.disabled=false;btn.innerHTML="Publicar tudo";return}
    if(!get(card,"marca"))   {showAlert("Preencha a marca","er");btn.disabled=false;btn.innerHTML="Publicar tudo";return}
    if(!get(card,"cor"))     {showAlert("Selecione a cor","er");btn.disabled=false;btn.innerHTML="Publicar tudo";return}
    if(!get(card,"tamanho")) {showAlert("Selecione o tamanho","er");btn.disabled=false;btn.innerHTML="Publicar tudo";return}
    if(!get(card,"sexo"))    {showAlert("Selecione o gênero","er");btn.disabled=false;btn.innerHTML="Publicar tudo";return}

    produtos.push({
      title,
      description:     get(card,"descricao"),
      category_id:     get(card,"categoria"),
      listing_type:    get(card,"listing_type")||"gold_special",
      condition:       get(card,"condition")||"new",
      price:           preco,
      quantidade:      qtd,
      frete_gratis:    freteEl?freteEl.checked:false,
      pictures:        imagens,
      marca:           get(card,"marca"),
      modelo:          get(card,"modelo"),
      cor:             get(card,"cor"),
      sexo:            get(card,"sexo"),
      tamanho:         get(card,"tamanho"),
      sku:             get(card,"sku"),
      garantia:        get(card,"garantia"),
      peso_kg:         get(card,"peso_kg"),
      largura_cm:      get(card,"largura_cm"),
      altura_cm:       get(card,"altura_cm"),
      profundidade_cm: get(card,"profundidade_cm"),
      extra_attributes:montarExtras(card)
    });
  }

  try{
    const res  = await fetch("/api/create-items",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({produtos,token})});
    const data = await res.json();
    console.log("ML Response:",data);
    renderR(data);
    const errs=data.filter(r=>r.erro).length;
    if(!errs) showAlert(`✅ ${data.length} anúncio(s) publicado(s) com sucesso!`,"ok");
    else      showAlert(`⚠️ ${errs} erro(s) — veja detalhes acima`,"er");
  }catch(err){
    showAlert("Erro de conexão: "+err.message,"er");
  }
  btn.disabled=false;btn.innerHTML="Publicar tudo";
}

/* ── RENDER RESULTADOS ───────────────────────────────────────────────── */
function renderR(data){
  const area=document.getElementById("resultArea");
  area.innerHTML="";
  const errs=data.filter(r=>r.erro).length;
  const h=document.createElement("div");
  h.className="rh";
  h.textContent=errs===0?`✅ ${data.length} anúncio(s) publicado(s) com sucesso!`:`⚠️ Publicação concluída com ${errs} falha(s)`;
  area.appendChild(h);

  data.forEach(r=>{
    const row=document.createElement("div");
    row.className=`rr ${r.sucesso?"ok":"er"}`;

    if(r.sucesso){
      row.innerHTML=`<span style="font-size:18px">✔</span>
        <div><b>${r.produto}</b> — ID: ${r.id}
        ${r.link?`<br><a class="rl" href="${r.link}" target="_blank">🔗 Ver anúncio no Mercado Livre</a>`:""}</div>`;
    } else {
      const det=r.detalhe||{};
      let causas=[];

      // Usar cause_pt (traduzido pelo backend) se disponível
      if(Array.isArray(det.cause_pt)&&det.cause_pt.length>0){
        causas=det.cause_pt.map(c=>c.message_pt||traduzir(c.message)||JSON.stringify(c));
      } else if(Array.isArray(det.cause)&&det.cause.length>0){
        causas=det.cause.map(c=>traduzir(c.message||c.code||JSON.stringify(c)));
      } else {
        causas=[traduzir(det.message||JSON.stringify(det))];
      }

      const cHtml=causas.map(c=>`• ${c}`).join("<br>");
      const rawJson=JSON.stringify(det,null,2);
      const dbgId="d"+Math.random().toString(36).substr(2,6);

      row.innerHTML=`<span style="font-size:18px">✖</span>
        <div style="flex:1">
          <b>${r.produto}</b>
          <div class="rc">${cHtml}</div>
          <span class="dt" onclick="var el=document.getElementById('${dbgId}');el.style.display=el.style.display==='none'?'block':'none'">▸ ver resposta completa da ML</span>
          <pre class="dbg" id="${dbgId}">${rawJson}</pre>
        </div>`;
    }
    area.appendChild(row);
  });
  area.scrollIntoView({behavior:"smooth"});
}
</script>
