<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/hiagorhyanns/mercado-livre-api/29a8c4b095c3e39ee5ecf28f0e4be283621d5f61/img/conectado-ml.png">
<title>::. Publicar. ::. Anúncios ::.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  font-family: 'Inter' !important;
  box-sizing: border-box;
}
body {
  background:#ededed;
}
.container {
  width:900px;
  margin:40px auto;
}
.row {
  display:flex;
  gap:10px;
}
input, textarea, select {
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px;
  width:100%;
  margin-bottom:10px;
}
textarea {
  height:80px;
}
button {
  padding:12px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}
.add {
  background:#3483fa;
  color:white;
}
.publish {
  background:#00a650;
  color:white;
}
.card {
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:8px;
}
</style>
</head>

<body>
<div class="container">

<div id="formArea"></div>

<button class="add" onclick="addForm()">Criar mais +1 anúncio</button>
<button class="publish" onclick="publicar()">Publicar anúncios em massa</button>

</div>

<script>

const token = new URLSearchParams(window.location.search).get("token");

function formatarPreco(input){
  let v = input.value.replace(/\D/g, "");
  v = (v / 100).toFixed(2) + "";
  v = v.replace(".", ",");
  v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  input.value = "R$ " + v;
}

function gerarTitulo(card){
  const inputs = card.querySelectorAll("input");

  const produto = inputs[4].value;
  const modelo = inputs[5].value;
  const detalhes = inputs[6].value;
  const marca = inputs[7].value;
  const cor = inputs[8].value;
  const sexo = inputs[9].value;

  let titulo = `${produto} ${modelo} ${detalhes} ${marca} ${cor} ${sexo}`;

  titulo = titulo.trim().substring(0, 60);

  inputs[10].value = titulo;
}

function addForm(){
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="row">
      <input placeholder="Imagem 1 URL">
      <input placeholder="Imagem 2 URL">
      <input placeholder="Imagem 3 URL">
      <input placeholder="Imagem 4 URL">
    </div>
    
    <div class="row">
      <input placeholder="Produto" oninput="gerarTitulo(this.closest('.card'))">
      <input placeholder="Modelo" oninput="gerarTitulo(this.closest('.card'))">
      <input placeholder="Detalhes" oninput="gerarTitulo(this.closest('.card'))">
      <input placeholder="Marca" oninput="gerarTitulo(this.closest('.card'))">
      <input placeholder="Cor" oninput="gerarTitulo(this.closest('.card'))">
      <input placeholder="Sexo" oninput="gerarTitulo(this.closest('.card'))">
    </div>

    <input placeholder="Nome completo do produto (máx 60)" maxlength="60">

    <textarea placeholder="Descrição"></textarea>

    <select>
      <option value="MLB1430">Vestidos</option>
      <option value="MLB1744">Peças Impressora 3D</option>
    </select>

    <input placeholder="Preço" oninput="formatarPreco(this)">
  `;

  document.getElementById("formArea").appendChild(div);
}

addForm();

async function publicar(){

  const cards = document.querySelectorAll(".card");
  const produtos = [];

  for (const card of cards) {

    const inputs = card.querySelectorAll("input, textarea, select");

    const title = inputs[10].value.trim();
    const descricao = inputs[11].value.trim();
    const categoria = inputs[12].value;
    const preco = inputs[13].value.replace(/\D/g, "") / 100;

    const imagens = [
      inputs[0].value,
      inputs[1].value,
      inputs[2].value,
      inputs[3].value
    ].filter(i => i);

    if (!title || !preco || imagens.length === 0) {
      alert("Preencha título, preço e ao menos 1 imagem");
      return;
    }

    produtos.push({
      title,
      description: descricao,
      category_id: categoria,
      price: preco,
      pictures: imagens
    });
  }

  const res = await fetch("/api/create-items", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ produtos, token })
  });

  const data = await res.json();

  console.log(data);

  if (data.some(r => r.error)) {
    alert("Erro em alguns anúncios");
  } else {
    alert("Anúncios publicados com sucesso!");
  }
}
</script>

</body>
</html>
